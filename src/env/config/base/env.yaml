config_version: 1

retriever:
  embedding_model: hashing_v1

noise:
  mode: none
  ratio: 0.0

query_sample:
  size: null
  seed: 42

blocker:
  enable_block: false
  selection_mode: target_remaining_ratio
  block_n_per_task: null
  target_remaining_paths: null
  target_remaining_ratio: 0.6
  remaining_tolerance: 1
  min_remaining_paths: 1
  remaining_path_length_objective: none
  blocking_edge_count_objective: none
  noise_mode: random
  fixed_noise_type: null
  seed: 42
  max_combo_candidates: 5000
  max_cover_size: 4

runtime:
  max_steps: 100
  max_label_errors: 3
  max_retrieval_errors: 3
  max_call_errors: 3
  max_concurrency: 32
  llm_max_concurrent_requests: null
  max_resume_attempts: 3
  truncate_history: false

output:
  root_dir: outputs
  save_progress_every_turn: true
  save_raw_llm_response: true

logging:
  level: INFO
  console: true
