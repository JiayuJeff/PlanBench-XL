run_id: retail_gpt54_mini_default
base_config: src/env/config/base/env.yaml
model_ref: openai_gpt54_mini
domain: retail

data:
  task_file: src/data/retail/tasks.json
  query_file: src/data/retail/queries.json
  baseline_tools_file: src/data/retail/baseline_tools.json
  noisy_tools_file: src/data/retail/noisy_tools.json
  blocker_tools_file: src/data/retail/blocker_tools.json
  datatypes_file: src/data/retail/datatypes.json
  database_file: src/data/retail/database.json
  paths_set_catalog_file: src/data/retail/paths_set_catalog.json

output:
  output_dir: retail/gpt-5.4-mini/default

overrides:
  noise:
    mode: append_noisy_siblings
    ratio: 0.0
    max_total_tools: 30
  runtime:
    max_steps: 100
    max_concurrency: 32
